        /* CURSORE NEON FIX */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            position: fixed;
            border-radius: 50%;
            z-index: 10001;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-green);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid var(--neon-green);
            position: fixed;
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out, opacity 0.3s ease;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            opacity: 0;
        }

        header:not(.scrolled) .logo-text, header:not(.scrolled) nav ul li a {
            color: var(--text-dark);
        }
        header:not(.scrolled) .menu-toggle span {
            background-color: var(--text-dark);
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .app-icon-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition-smooth);
        }
        .app-icon svg {
            width: 35px;
            height: 35px;
            transition: var(--transition-smooth);
        }
        .app-icon-card:hover {
            transform: translateY(-8px) scale(1.03);
        }
        .app-icon-card:hover .app-icon {
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .app-icon-card span {
            color: var(--color-earth);
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .icon-mail { border-bottom: 5px solid var(--color-leaf); color: var(--color-leaf); }
        .icon-ig { border-bottom: 5px solid #E1306C; color: #E1306C; }
        .icon-fb { border-bottom: 5px solid #1877F2; color: #1877F2; }

        .app-icon-card:hover .icon-wa { background: #25D366; color: white; }
        .app-icon-card:hover .icon-mail { background: var(--color-leaf); color: white; }
        .app-icon-card:hover .icon-ig { background: #E1306C; color: white; }
        .app-icon-card:hover .icon-fb { background: #1877F2; color: white; }

        @media (max-width: 480px) {

                gap: 1.5rem;
            }
            .app-icon { width: 70px; height: 70px; }
            .app-icon svg { width: 30px; height: 30px; }
            h1 { font-size: 2.5rem !important; }
        }

    <!-- LOGICA JAVASCRIPT -->
    <script>
        // Toggle Menu Hamburger
        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.querySelector('#nav-menu');
        menuToggle.addEventListener('click', () => {
            const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
            menuToggle.setAttribute('aria-expanded', !expanded);
            navMenu.classList.toggle('active');
        });

        // Intersection Observer per animazioni reveal
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        // Gestione movimento cursore personalizzato
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            dot.style.opacity = "1";
            outline.style.opacity = "1";
            dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`;
            outline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: 'forwards' });
        });

        // Logica Scroll Header
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
    </script>
